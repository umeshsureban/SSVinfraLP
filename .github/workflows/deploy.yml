name: Deploy to VPS (ssvinfra.aitomate.cloud)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Rsync Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Set landing page as index
        run: cp public/ssvinfra.html out/index.html

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

      - name: Diagnose port connectivity
        run: |
          echo "=== Checking which SSH port is reachable ==="
          for port in 22 2222 22222 65002; do
            result=$(nc -zv -w 8 ${{ secrets.SSH_HOST }} $port 2>&1 || true)
            echo "Port $port: $result"
          done

      - name: Test SSH Connection
        run: |
          SSH_PORT=22
          # detect open port from nc scan
          for port in 22 2222 22222 65002; do
            nc -zv -w 8 ${{ secrets.SSH_HOST }} $port 2>/dev/null && SSH_PORT=$port && break || true
          done
          echo "Using SSH port: $SSH_PORT"
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            -p $SSH_PORT \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "echo SSH OK"

      - name: Deploy using rsync
        run: |
          SSH_PORT=22
          for port in 22 2222 22222 65002; do
            nc -zv -w 8 ${{ secrets.SSH_HOST }} $port 2>/dev/null && SSH_PORT=$port && break || true
          done
          echo "Deploying to ssvinfra.aitomate.cloud on port $SSH_PORT..."
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p $SSH_PORT" \
            ./out/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_TARGET_DIR }}/
          echo "Deployment complete."
